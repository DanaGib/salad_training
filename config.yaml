model:
  # Options: "salad_baseline" | "salad_joint_depth"
  # salad_baseline: standard SALAD, no depth branch, alpha is ignored
  # salad_joint_depth: adds frozen DepthTeacher + AlignmentMLP + AlignmentLoss
  type: "salad_baseline"

  backbone:
    arch: "dinov2_vitb14"
    num_trainable_blocks: 4
    return_token: true
    norm_layer: true

  aggregator:
    num_channels: 768
    num_clusters: 64
    cluster_dim: 128
    token_dim: 256

  # Alignment MLP — only used when model.type = salad_joint_depth
  mlp:
    # Options: "token_by_token" (shared Linear applied per-patch)
    # Future: "flattened", "global"
    type: "token_by_token"
    input_dim: 768
    hidden_dim: 1024
    output_dim: 768

  # Where to apply L2 normalisation in the alignment branch
  # "after_mlp"  : normalise both student output and teacher patches before loss
  # "before_mlp" : normalise student patches before feeding into the MLP
  # "none"       : no normalisation; loss sees raw magnitudes
  normalization:
    stage: "after_mlp"

  teacher:
    name: "depth-anything/Depth-Anything-V2-Base-hf"

loss:
  vpr_loss: "MultiSimilarityLoss"
  miner: "MultiSimilarityMiner"
  miner_margin: 0.1
  # Options: "mse" | "cosine"
  alignment_loss_type: "mse"
  # Weight of the alignment loss in the combined objective
  alpha: 0.2

training:
  batch_size: 60
  img_per_place: 4
  min_img_per_place: 4
  image_size: [224, 224]
  num_workers: 10
  max_epochs: 4
  lr: 6.0e-5
  optimizer: "adamw"
  weight_decay: 9.5e-9
  momentum: 0.9
  lr_sched: "linear"
  lr_sched_start_factor: 1.0
  lr_sched_end_factor: 0.2
  lr_sched_total_iters: 4000
  precision: "16-mixed"
  # Print + log to W&B every N iterations (running averages)
  log_interval: 1000
  val_set_names: ["pitts30k_val"]
  faiss_gpu: false
  # -1 = keep all epoch checkpoints; set to 3 to keep only the best 3 by R@1
  save_top_k: -1

wandb:
  project: "salad-vpr"
  entity: null   # set to your W&B username/team if needed
  run_name: null # auto-generated by W&B if null
